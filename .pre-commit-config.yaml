repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements
  - repo: local
    hooks:
      - id: ty
        name: ty (changed python files)
        entry: bash scripts/pre-commit-ty.sh
        language: system
        files: ^(src|tests|scripts)/.*\.py$
        pass_filenames: true
        require_serial: true
